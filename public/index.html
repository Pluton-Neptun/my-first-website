<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Главная страница</title>
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
   
    <script src="/ga.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center; 
            /* Стили для фонового изображения */
            background-image: url('/images/background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            margin: 0;
            padding: 20px;
            /* Центрируем всё по вертикали на весь экран */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            font-size: 3.5em; /* Чуть увеличили на ПК */
            margin-top: 0;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.3em;
            margin-bottom: 40px;
        }

        a {
            display: inline-block;
            margin: 10px;
            padding: 15px 35px; /* Сделали кнопки толще */
            font-size: 1.4em; /* Увеличили шрифт кнопок */
            color: white;
            background-color: rgba(0, 0, 0, 0.5);
            border: 2px solid white;
            text-decoration: none;
            border-radius: 8px; /* Скруглили сильнее */
            transition: background-color 0.3s, transform 0.3s;
            font-weight: bold;
        }

        a:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        /* 👇 АДАПТАЦИЯ ДЛЯ ТЕЛЕФОНОВ */
        @media (max-width: 600px) {
            h1 { font-size: 2.5em; } /* Уменьшаем заголовок, чтобы влез */
            p { font-size: 1.2em; padding: 0 10px; }
            
            div { width: 100%; } /* Контейнер кнопок на всю ширину */
            
            a {
                display: block; /* Выстраиваем кнопки друг под другом */
                width: 90%; 
                max-width: 320px;
                margin: 15px auto; /* Расстояние между кнопками */
                padding: 18px 20px;
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <h1>Добро пожаловать!</h1> <p>Вы можете войти в систему или зарегистрироваться.</p>
    <div style="width: 100%;">
        <a href="/login">Войти</a>
        <a href="/register.html">Зарегистрироваться</a>
    </div>
</body>
</html>
